<!DOCTYPE html>
<html>
<head>
  <title>Hospital Price Comparison</title>
</head>
<body>
<h1>Hospital Service Price Comparison</h1>

<input id="searchInput" placeholder="Search service (X-ray, MRI)">
<button onclick="searchService()">Search</button>
<ul id="results"></ul>

<script>
const hospitals = [
  {name: "City Care Hospital", service: "X-ray", price: 500},
  {name: "Apollo Clinic", service: "X-ray", price: 650},
  {name: "Health Plus", service: "Blood Test", price: 400}
];
function searchService(){
  const input = document.getElementById("searchInput").value.toLowerCase();
  const results = document.getElementById("results");

  results.innerHTML = "";

  hospitals.forEach(h => {
    if(h.service.toLowerCase().includes(input)){
      const li = document.createElement("li");
      li.textContent = h.name + " - " + h.service + " - ₹" + h.price;
      results.appendChild(li);
    }
  });
}

</script>
</body>
</html>
